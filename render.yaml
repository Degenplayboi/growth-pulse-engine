services:
  - type: web
    name: growth-pulse-engine
    runtime: python
    plan: free
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: python app.py
    healthCheckPath: /
    envVars:
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      # IMPROVED: BREVO_API_KEY is read by send_beast_email() but was never
      # declared here — without it, every send silently fails.
      - key: BREVO_API_KEY
        sync: false
      # IMPROVED: Google Places replaced with Geoapify. Sign up free at
      # myprojects.geoapify.com — no credit card required.
      - key: GEOAPIFY_API_KEY
        sync: false
      - key: GEOAPIFY_DAILY_CALL_CAP
        value: "2500"
      - key: GEOAPIFY_DETAILS_PER_CYCLE
        value: "15"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: SENDER_DISPLAY_NAME
        value: Growth Pulse Solutions
      # IMPROVED: lowered from 100 — each candidate can trigger a Geoapify
      # Place Details call and/or a rate-limited DDG lookup, so a large
      # number here now costs real time and quota per cycle, not just API
      # calls. Raise once you've watched a few cycles complete cleanly.
      # IMPROVED for 180/day target: raised back up now that scrape_domain
      # skips founder/competitor/GBP lookups for candidates with no email
      # (was the biggest throughput leak) and hunt_candidates pulls from
      # three sources (Geoapify → Overpass → multi-query DDG) instead of one.
      - key: MAX_HUNT_RESULTS
        value: "30"
      # IMPROVED: shortened from 1800s so more of the 104 niche×city
      # combinations get a turn per day. This is a real trade-off against
      # DDG courtesy scraping — if you see search calls starting to fail,
      # raise this back up rather than pushing it lower.
      - key: LOOP_INTERVAL_SECONDS
        value: "900"
      - key: DAILY_EMAIL_CAP
        value: "180"
      # IMPROVED: warm-up ramp inputs — set CAMPAIGN_START_DATE (YYYY-MM-DD)
      # once, on first deploy, to the date you actually start sending.
      - key: CAMPAIGN_START_DATE
        value: ""
      - key: WARMUP_DAYS
        value: "10"
      - key: WARMUP_START_CAP
        value: "20"
      - key: EMAIL_SEND_DELAY_SECONDS
        value: "5"
      - key: EMAIL_SEND_JITTER_SECONDS
        value: "4"

      # --- PHASE 4: PERSISTENCE (survives Render free-tier restarts) ---
      # A private GitHub repo is fine. Token needs "repo" (or fine-grained
      # Contents read/write) scope on that one repo.
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_BACKUP_REPO
        value: ""
      - key: GITHUB_BACKUP_BRANCH
        value: "main"
      - key: BACKUP_INTERVAL_SECONDS
        value: "900"

      # --- PHASE 4: SEND-WINDOW GATING (local business hours per city) ---
      - key: SEND_WINDOW_START_HOUR
        value: "9"
      - key: SEND_WINDOW_END_HOUR
        value: "17"

      # --- GLOBAL TARGET MATRIX (HIGH-BUDGET METROS & HIGH-VALUE NICHES) ---
      # NOTE: of these, only "Commercial Electricians" maps to a real
      # Geoapify category (service.electrician). Everything else here runs
      # through the DuckDuckGo business-discovery fallback instead of a
      # structured places API — lower precision, worth watching lead volume
      # per niche on the dashboard before assuming it's underperforming.
      - key: AUTOMATED_NICHES
        value: "Commercial Roofing, Solar Panel Installation, Custom Home Builders, Luxury Landscaping, Foundation Repair Contractors, HVAC Mechanical, Commercial Electricians, Swimming Pool Builders"
      - key: AUTOMATED_CITIES
        value: "New York NY, Los Angeles CA, Houston TX, Chicago IL, Miami FL, London UK, Toronto ON, Sydney Australia, Dubai UAE, Atlanta GA, Phoenix AZ, Dallas TX, Las Vegas NV"
        
